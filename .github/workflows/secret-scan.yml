# Server-side secret scanning. Runs on every push and pull request and on a
# weekly schedule. Cannot be bypassed by contributors who skip local hooks.
# Place this file at: .github/workflows/secret-scan.yml
name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 6 * * 1'   # weekly full-history sweep, Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so the scan covers all commits in a PR, not just the tip
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If using the free OSS action no license is needed for public repos.
          # For org-owned private repos, set GITLEAKS_LICENSE in repo secrets:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Second, independent scanner for defense in depth.
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
